name: 🚀 SaaS 幽灵协议·自动轮询
# 触发条件：定时 + 手动
# 默认每 2 天执行一次（可自行修改 cron 表达式）
# cron 说明：分 时 日 月 周（UTC 时间）
# 0 19 */2 * * = 每2天的北京时间 3:00 执行
# （UTC 19:00 = 北京时间次日 3:00）
on:
  schedule:
    - cron: '0 19 */2 * *'
  workflow_dispatch:  # 支持手动触发
jobs:
  saas-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 执行 SaaS 幽灵协议
        env:
          # glass.js Worker（获取 SaaS 配置 + 执行域名更换）
          WORKER_URL: ${{ secrets.WORKER_URL }}
          ADMIN_PWD: ${{ secrets.ADMIN_PWD }}
          # 兼容旧变量名（saas-engine 时代用的）
          GLASS_URL: ${{ secrets.WORKER_URL }}
          GLASS_PWD: ${{ secrets.ADMIN_PWD }}
        run: node scripts/engine.js
